name: ProductAPI CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # Build solution
      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      # Run Unit Tests
      - name: Run Unit Tests
        run: |
          dotnet test tests/ProductAPI.UnitTests \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=unit-tests.trx" \
            --results-directory TestResults

      # Run Integration Tests
      - name: Run Integration Tests
        run: |
          dotnet test tests/ProductAPI.IntegrationTests \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=integration-tests.trx" \
            --results-directory TestResults

      # Code Coverage (both test projects)
      - name: Run Code Coverage
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

      # Upload Test Results and Code Coverage to GitHub Actions Artifacts
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t productapi-grpc:latest .