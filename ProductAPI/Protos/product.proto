syntax = "proto3";

option csharp_namespace = "ProductAPI.Protos";

package product;


// Product Message
message ProductMessage {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  bool available = 5;
}

// Create Product
message CreateProductRequest {
  string name = 1;
  string description = 2;
  double price = 3;
  bool available = 4;
}

// Get Product
message GetProductRequest {
  string id = 1;
}

// Update Product
message UpdateProductRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  bool available = 5;
}

// Delete Product
message DeleteProductRequest {
  string id = 1;
}

// List Products
message ListProductsRequest {
}


// Responses
message ProductResponse {
  ProductMessage product = 1;
}

message ListProductsResponse {
  repeated ProductMessage products = 1;
}

message DeleteProductResponse {
  bool success = 1;
}


// gRPC Service
service ProductService {

  rpc CreateProduct(CreateProductRequest)
      returns (ProductResponse);

  rpc GetProduct(GetProductRequest)
      returns (ProductResponse);

  rpc ListProducts(ListProductsRequest)
      returns (ListProductsResponse);

  rpc UpdateProduct(UpdateProductRequest)
      returns (ProductResponse);

  rpc DeleteProduct(DeleteProductRequest)
      returns (DeleteProductResponse);
}